version: '3.8'

services:
  # ==========================================
  # MAIN SYSTEM DATABASE
  # ==========================================
  sqlexam.postgres:
    image: postgres:16-alpine
    container_name: sqlexam.postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-123456}
      POSTGRES_DB: ${DATABASE_NAME:-sql_exam_db}
    ports:
      - "5432:5432"
    volumes:
      - sqlexam_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sql_exam_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sqlexam_network

  # ==========================================
  # SANDBOX DATABASES (FOR QUERY EXECUTION)
  # ==========================================
  sqlexam.postgres.sandbox:
    image: postgres:16-alpine
    container_name: sqlexam.postgres.sandbox
    environment:
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: ${SANDBOX_PASSWORD:-123456}
      POSTGRES_DB: sandbox_db
    ports:
      - "5433:5432"
    volumes:
      - sqlexam_postgres_sandbox_data:/var/lib/postgresql/data
      - ./sandbox/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sandbox -d sandbox_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sqlexam_network

  sqlexam.mysql.sandbox:
    image: mysql:8
    container_name: sqlexam.mysql.sandbox
    environment:
      MYSQL_USER: sandbox
      MYSQL_PASSWORD: ${SANDBOX_PASSWORD:-123456}
      MYSQL_DATABASE: sandbox_db
      MYSQL_ROOT_PASSWORD: ${SANDBOX_PASSWORD:-123456}
    ports:
      - "3307:3306"
    volumes:
      - sqlexam_mysql_sandbox_data:/var/lib/mysql
      - ./sandbox/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "sandbox", "-p${SANDBOX_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sqlexam_network

  sqlexam.sqlserver.sandbox:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlexam.sqlserver.sandbox
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SANDBOX_PASSWORD:-123456}
      MSSQL_PID: Developer
    ports:
      - "1434:1433"
    volumes:
      - sqlexam_sqlserver_sandbox_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SANDBOX_PASSWORD:-123456}", "-Q", "SELECT 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    networks:
      - sqlexam_network

  # ==========================================
  # CACHING LAYER
  # ==========================================
  sqlexam.redis:
    image: redis:7-alpine
    container_name: sqlexam.redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
    ports:
      - "6379:6379"
    volumes:
      - sqlexam_redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sqlexam_network

  # ==========================================
  # EVENT STREAMING (KAFKA)
  # ==========================================
  sqlexam.kafka:
    image: apache/kafka:3.8.0
    container_name: sqlexam.kafka
    environment:
      # KRaft Controller Settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://sqlexam.kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@sqlexam.kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_BROKER_RACK: rack1
      # Auto Topic Creation
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Log Retention (keep for 7 days for audit trail)
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824  # 1GB
      # Performance
      KAFKA_NUM_NETWORK_THREADS: 8
      KAFKA_NUM_IO_THREADS: 8
      KAFKA_COMPRESSION_TYPE: snappy
    ports:
      - "9092:9092"
      - "29092:29092"
      - "9093:9093"
    volumes:
      - sqlexam_kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sqlexam_network

  # Kafka UI for monitoring
  sqlexam.kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sqlexam.kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: sqlexam
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: sqlexam.kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: ""
    ports:
      - "8081:8080"
    depends_on:
      - sqlexam.kafka
    restart: unless-stopped
    networks:
      - sqlexam_network

  # ==========================================
  # OBJECT STORAGE (MINIO)
  # ==========================================
  sqlexam.minio:
    image: minio/minio:latest
    container_name: sqlexam.minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - sqlexam_minio_data:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sqlexam_network

# ==========================================
# NETWORKS & VOLUMES
# ==========================================
networks:
  sqlexam_network:
    name: sqlexam_network
    driver: bridge

volumes:
  sqlexam_postgres_data:
    name: sqlexam_postgres_data
  sqlexam_postgres_sandbox_data:
    name: sqlexam_postgres_sandbox_data
  sqlexam_mysql_sandbox_data:
    name: sqlexam_mysql_sandbox_data
  sqlexam_sqlserver_sandbox_data:
    name: sqlexam_sqlserver_sandbox_data
  sqlexam_redis_data:
    name: sqlexam_redis_data
  sqlexam_kafka_data:
    name: sqlexam_kafka_data
  sqlexam_minio_data:
    name: sqlexam_minio_data
